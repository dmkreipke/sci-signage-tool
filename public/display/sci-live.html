<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SCI Live Theater Program Schedule</title>
  <link rel="stylesheet" href="theater-display.css">
</head>
<body class="theme-sci-live" data-display="sci-live">
  <div class="bg"></div>
  <div class="screen">
    <div class="header">
      <div class="title">
        <div class="title-main">SCI Live Theater</div>
        <div class="title-sub">Program Schedule</div>
        <div class="clock" id="clock">--:--:-- --</div>
      </div>
    </div>
    <div id="top-cards"></div>
    <div id="coming-up-label"></div>
    <div class="schedule-container" id="schedule-container">
      <div class="schedule-list" id="schedule-list">
        <div class="empty-msg">Loading schedule…</div>
      </div>
    </div>
  </div>
  <script src="kiosk-lock.js"></script>
  <script src="time-override.js"></script>
  <script src="theater-display.js"></script>
</body>
</html>
