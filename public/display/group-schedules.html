<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCI Group Schedules — Today's Groups</title>
  <link rel="stylesheet" href="group-schedules.css?v=2">
</head>
<body>
  <div class="bg"></div>

  <div id="preview-banner" class="preview-banner" hidden>PREVIEW MODE</div>

  <header class="top-bar">
    <div class="top-bar-title">Welcome to the Science Center of Iowa</div>
    <div class="top-bar-clock" id="clock"></div>
  </header>

  <main class="stage">
    <aside class="sidebar">
      <div class="sidebar-rows">
        <div class="sidebar-row" data-row="group">Group</div>
        <div class="sidebar-row" data-row="lunch">Lunch</div>
        <div class="sidebar-row" data-row="programs">Program(s)</div>
      </div>
    </aside>

    <section class="card-lane" id="card-lane">
      <div class="card-track" id="card-track">
        <!-- cards injected by JS, duplicated for seamless loop -->
      </div>
      <div class="empty-state" id="empty-state" hidden>
        <p>No groups scheduled today.</p>
      </div>
    </section>
  </main>

  <script src="kiosk-lock.js"></script>
  <script src="group-schedules.js?v=7"></script>
</body>
</html>
